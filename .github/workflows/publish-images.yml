name: Publish container images

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write
  artifact-metadata: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    name: Publish ${{ matrix.component }} image
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false

      matrix:
        include:
          - component: backend
            context: ./backend
            image: relescope-backend
            build_args: ""

          - component: frontend
            context: ./frontend
            image: relescope-frontend
            build_args: VITE_API_URL=/api

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}

          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          push: true
          build-args: ${{ matrix.build_args }}
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}

          cache-from: >-
            type=gha,scope=${{ matrix.component }}

          cache-to: >-
            type=gha,mode=max,scope=${{ matrix.component }}

      - name: Generate signed build provenance
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}

          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
