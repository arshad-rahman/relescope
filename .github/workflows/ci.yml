name: CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: >-
    ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: >-
            frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run lint

      - name: Build frontend
        run: npm run build

  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: >-
        sqlite:///./data/ci.db
      AI_PROVIDER: gemini
      GEMINI_API_KEY: ci-placeholder-not-used

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: >-
            backend/requirements.txt

      - name: Upgrade pip
        run: >-
          python -m pip install
          --upgrade pip

      - name: Install backend dependencies
        run: >-
          python -m pip install
          -r requirements.txt

      - name: Validate installed dependencies
        run: python -m pip check

      - name: Compile Python files
        run: >-
          python -m compileall
          -q
          app
          main.py
          migrations
          tests

      - name: Remove previous CI database
        run: rm -f data/ci.db

      - name: Apply database migrations
        run: alembic upgrade head

      - name: Run backend tests
        run: >-
          python -m unittest discover
          -s tests
          -p "test_*.py"
          -v

      - name: Test migration rollback
        run: alembic downgrade base

      - name: Reapply database migrations
        run: alembic upgrade head

      - name: Display migration state
        run: alembic current

  backend-container:
    name: Backend container checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Build backend image
        run: >-
          docker build
          --tag relescope-backend:ci
          ./backend

      - name: Create database volume
        run: >-
          docker volume create
          relescope-ci-data

      - name: Apply migrations
        run: |
          docker run \
            --rm \
            --env DATABASE_URL=sqlite:////app/data/relescope.db \
            --volume relescope-ci-data:/app/data \
            relescope-backend:ci \
            alembic upgrade head

      - name: Verify migration state
        run: |
          docker run \
            --rm \
            --env DATABASE_URL=sqlite:////app/data/relescope.db \
            --volume relescope-ci-data:/app/data \
            relescope-backend:ci \
            alembic current | grep -q "(head)"

      - name: Start backend container
        run: |
          docker run \
            --detach \
            --name relescope-backend-ci \
            --publish 8000:8000 \
            --env DATABASE_URL=sqlite:////app/data/relescope.db \
            --env AI_PROVIDER=gemini \
            --env GEMINI_API_KEY=ci-placeholder-not-used \
            --volume relescope-ci-data:/app/data \
            relescope-backend:ci

      - name: Wait for container health
        run: |
          for attempt in {1..30}; do
            status="$(
              docker inspect \
                --format='{{.State.Health.Status}}' \
                relescope-backend-ci \
                2>/dev/null || true
            )"

            echo "Attempt ${attempt}: ${status:-not-ready}"

            if [ "$status" = "healthy" ]; then
              exit 0
            fi

            running="$(
              docker inspect \
                --format='{{.State.Running}}' \
                relescope-backend-ci \
                2>/dev/null || echo false
            )"

            if [ "$running" != "true" ]; then
              docker logs relescope-backend-ci
              exit 1
            fi

            sleep 2
          done

          docker logs relescope-backend-ci
          exit 1

      - name: Test backend endpoints
        run: |
          curl -fsS http://127.0.0.1:8000/
          echo
          curl -fsS http://127.0.0.1:8000/health
          echo

      - name: Verify non-root runtime
        run: |
          docker exec \
            relescope-backend-ci \
            id | grep -q "uid=10001(relescope)"

      - name: Show container logs on failure
        if: failure()
        run: docker logs relescope-backend-ci || true

      - name: Clean up Docker resources
        if: always()
        run: |
          docker rm \
            --force \
            relescope-backend-ci \
            2>/dev/null || true

          docker volume rm \
            relescope-ci-data \
            2>/dev/null || true
