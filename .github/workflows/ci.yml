name: CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: >-
    ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: >-
            frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run lint

      - name: Build frontend
        run: npm run build

  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: >-
        sqlite:///./data/ci.db
      AI_PROVIDER: gemini
      GEMINI_API_KEY: ci-placeholder-not-used

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: >-
            backend/requirements.txt

      - name: Upgrade pip
        run: >-
          python -m pip install
          --upgrade pip

      - name: Install backend dependencies
        run: >-
          python -m pip install
          -r requirements.txt

      - name: Validate installed dependencies
        run: python -m pip check

      - name: Compile Python files
        run: >-
          python -m compileall
          -q
          app
          main.py
          migrations
          tests

      - name: Remove previous CI database
        run: rm -f data/ci.db

      - name: Apply database migrations
        run: alembic upgrade head

      - name: Run backend tests
        run: >-
          python -m unittest discover
          -s tests
          -p "test_*.py"
          -v

      - name: Test migration rollback
        run: alembic downgrade base

      - name: Reapply database migrations
        run: alembic upgrade head

      - name: Display migration state
        run: alembic current
