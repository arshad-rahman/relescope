name: CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: >-
    ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: >-
            frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run lint

      - name: Build frontend
        run: npm run build

  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: >-
        sqlite:///./data/ci.db
      AI_PROVIDER: gemini
      GEMINI_API_KEY: ci-placeholder-not-used

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: >-
            backend/requirements.txt

      - name: Upgrade pip
        run: >-
          python -m pip install
          --upgrade pip

      - name: Install backend dependencies
        run: >-
          python -m pip install
          -r requirements.txt

      - name: Validate installed dependencies
        run: python -m pip check

      - name: Compile Python files
        run: >-
          python -m compileall
          -q
          app
          main.py
          migrations
          tests

      - name: Remove previous CI database
        run: rm -f data/ci.db

      - name: Apply database migrations
        run: alembic upgrade head

      - name: Run backend tests
        run: >-
          python -m unittest discover
          -s tests
          -p "test_*.py"
          -v

      - name: Test migration rollback
        run: alembic downgrade base

      - name: Reapply database migrations
        run: alembic upgrade head

      - name: Display migration state
        run: alembic current

  backend-container:
    name: Backend container checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Build backend image
        run: >-
          docker build
          --tag relescope-backend:ci
          ./backend

      - name: Create database volume
        run: >-
          docker volume create
          relescope-ci-data

      - name: Apply migrations
        run: |
          docker run \
            --rm \
            --env DATABASE_URL=sqlite:////app/data/relescope.db \
            --volume relescope-ci-data:/app/data \
            relescope-backend:ci \
            alembic upgrade head

      - name: Verify migration state
        run: |
          docker run \
            --rm \
            --env DATABASE_URL=sqlite:////app/data/relescope.db \
            --volume relescope-ci-data:/app/data \
            relescope-backend:ci \
            alembic current | grep -q "(head)"

      - name: Start backend container
        run: |
          docker run \
            --detach \
            --name relescope-backend-ci \
            --publish 8000:8000 \
            --env DATABASE_URL=sqlite:////app/data/relescope.db \
            --env AI_PROVIDER=gemini \
            --env GEMINI_API_KEY=ci-placeholder-not-used \
            --volume relescope-ci-data:/app/data \
            relescope-backend:ci

      - name: Wait for container health
        run: |
          for attempt in {1..30}; do
            status="$(
              docker inspect \
                --format='{{.State.Health.Status}}' \
                relescope-backend-ci \
                2>/dev/null || true
            )"

            echo "Attempt ${attempt}: ${status:-not-ready}"

            if [ "$status" = "healthy" ]; then
              exit 0
            fi

            running="$(
              docker inspect \
                --format='{{.State.Running}}' \
                relescope-backend-ci \
                2>/dev/null || echo false
            )"

            if [ "$running" != "true" ]; then
              docker logs relescope-backend-ci
              exit 1
            fi

            sleep 2
          done

          docker logs relescope-backend-ci
          exit 1

      - name: Test backend endpoints
        run: |
          curl -fsS http://127.0.0.1:8000/
          echo
          curl -fsS http://127.0.0.1:8000/health
          echo

      - name: Verify non-root runtime
        run: |
          docker exec \
            relescope-backend-ci \
            id | grep -q "uid=10001(relescope)"

      - name: Show container logs on failure
        if: failure()
        run: docker logs relescope-backend-ci || true

      - name: Clean up Docker resources
        if: always()
        run: |
          docker rm \
            --force \
            relescope-backend-ci \
            2>/dev/null || true

          docker volume rm \
            relescope-ci-data \
            2>/dev/null || true

  frontend-container:
    name: Frontend container checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Build backend image
        run: |
          docker build \
            --tag relescope-backend:frontend-ci \
            ./backend

      - name: Build frontend image
        run: |
          docker build \
            --build-arg VITE_API_URL=/api \
            --tag relescope-frontend:ci \
            ./frontend

      - name: Create integration resources
        run: |
          docker network create \
            relescope-frontend-ci-network

          docker volume create \
            relescope-frontend-ci-data

      - name: Apply database migrations
        run: |
          docker run \
            --rm \
            --network relescope-frontend-ci-network \
            --env DATABASE_URL=sqlite:////app/data/relescope.db \
            --volume relescope-frontend-ci-data:/app/data \
            relescope-backend:frontend-ci \
            alembic upgrade head

      - name: Start backend container
        run: |
          docker run \
            --detach \
            --name relescope-backend-frontend-ci \
            --network relescope-frontend-ci-network \
            --network-alias backend \
            --env DATABASE_URL=sqlite:////app/data/relescope.db \
            --env AI_PROVIDER=gemini \
            --env GEMINI_API_KEY=ci-placeholder-not-used \
            --volume relescope-frontend-ci-data:/app/data \
            relescope-backend:frontend-ci

      - name: Wait for backend health
        run: |
          for attempt in {1..30}; do
            status="$(
              docker inspect \
                --format='{{.State.Health.Status}}' \
                relescope-backend-frontend-ci \
                2>/dev/null || true
            )"

            echo "Backend attempt ${attempt}: ${status:-not-ready}"

            if [ "$status" = "healthy" ]; then
              exit 0
            fi

            running="$(
              docker inspect \
                --format='{{.State.Running}}' \
                relescope-backend-frontend-ci \
                2>/dev/null || echo false
            )"

            if [ "$running" != "true" ]; then
              docker logs relescope-backend-frontend-ci
              exit 1
            fi

            sleep 2
          done

          docker logs relescope-backend-frontend-ci
          exit 1

      - name: Start frontend container
        run: |
          docker run \
            --detach \
            --name relescope-frontend-ci \
            --network relescope-frontend-ci-network \
            --publish 8080:8080 \
            relescope-frontend:ci

      - name: Wait for frontend health
        run: |
          for attempt in {1..30}; do
            status="$(
              docker inspect \
                --format='{{.State.Health.Status}}' \
                relescope-frontend-ci \
                2>/dev/null || true
            )"

            echo "Frontend attempt ${attempt}: ${status:-not-ready}"

            if [ "$status" = "healthy" ]; then
              exit 0
            fi

            running="$(
              docker inspect \
                --format='{{.State.Running}}' \
                relescope-frontend-ci \
                2>/dev/null || echo false
            )"

            if [ "$running" != "true" ]; then
              docker logs relescope-frontend-ci
              exit 1
            fi

            sleep 2
          done

          docker logs relescope-frontend-ci
          exit 1

      - name: Test frontend health endpoint
        run: |
          response="$(
            curl -fsS \
              http://127.0.0.1:8080/healthz
          )"

          test "$response" = "healthy"

      - name: Test SPA routes
        run: |
          curl -fsS http://127.0.0.1:8080/ >/dev/null
          curl -fsS http://127.0.0.1:8080/connect >/dev/null
          curl -fsS http://127.0.0.1:8080/dashboard >/dev/null
          curl -fsS http://127.0.0.1:8080/history >/dev/null

      - name: Test backend through Nginx
        run: |
          curl -fsS \
            "http://127.0.0.1:8080/api/saved-releases?owner_login=ci-smoke-test&limit=1"

          echo

      - name: Verify portable API URL in bundle
        run: |
          docker exec \
            relescope-frontend-ci \
            sh -c \
            '! grep -R -q "http://localhost:8000/api" /usr/share/nginx/html/assets'

          docker exec \
            relescope-frontend-ci \
            sh -c \
            'grep -R -q "/api" /usr/share/nginx/html/assets'

      - name: Verify non-root runtime
        run: |
          backend_uid="$(
            docker exec \
              relescope-backend-frontend-ci \
              id -u
          )"

          frontend_uid="$(
            docker exec \
              relescope-frontend-ci \
              id -u
          )"

          echo "Backend runtime UID: ${backend_uid}"
          echo "Frontend runtime UID: ${frontend_uid}"

          test "$backend_uid" != "0"
          test "$frontend_uid" != "0"

      - name: Show container logs on failure
        if: failure()
        run: |
          docker logs \
            relescope-backend-frontend-ci \
            || true

          docker logs \
            relescope-frontend-ci \
            || true

      - name: Clean up integration resources
        if: always()
        run: |
          docker rm \
            --force \
            relescope-frontend-ci \
            relescope-backend-frontend-ci \
            2>/dev/null || true

          docker volume rm \
            relescope-frontend-ci-data \
            2>/dev/null || true

          docker network rm \
            relescope-frontend-ci-network \
            2>/dev/null || true
